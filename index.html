<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fashion Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Fashion Store</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">Men</a>
            <a href="#">Women</a>
            <a href="#">New Arrivals</a>
            <a href="#">Contact</a>
        </nav>

    <section class="hero">

    <section class="products">

        <div class="card">
            <img src="https://via.placeholder.com/200" alt="">
            <h3>Trendy Dress</h3>
            <p>$39.99</p>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/200" alt="">
            <h3>Casual Shirt</h3>
            <p>$29.99</p>
        </div>

    <footer>
        <p>© 2026 Fashion Store | All Rights Reserved</p>
    </footer>

</body>
</html>
